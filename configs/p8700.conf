#!/bin/bash
# P8700 CPU configuration for RISC-V Linux roundtrip tests

CPU_NAME="p8700"
ARCH="riscv"
CROSS_COMPILE="riscv64-mti-linux-gnu-"
QEMU_MACHINE="boston-aia"
QEMU_CPU="mips-p8700"
QEMU_MEMORY="2G"
QEMU_SMP="4"
DEFCONFIG="defconfig"

# Boot patterns to watch for during QEMU boot
BOOT_PATTERNS=(
    "OpenSBI"
    "Linux version"
    "Machine model: MIPS P8700"
    "Run /sbin/init"
)

# Pre-built artifact URLs
FW_PAYLOAD_URL="https://github.com/MIPS/linux-test-downloads/raw/main/p8700/fw_payload.bin"
ROOTFS_URL="https://github.com/MIPS/linux-test-downloads/raw/main/p8700/rootfs.ext2"
